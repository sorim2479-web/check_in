<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorim Acupuncture & Healing Art Ltd</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #e8f5e9;
    text-align: center;
    padding: 20px;
}

.clinicName {
    font-size: 22px;
    font-weight: bold;
    color: #1b5e20;
}

.clinicSub {
    font-size: 14px;
    color: #4caf50;
    margin-bottom: 20px;
}

.container {
    background: #ffffff;
    padding: 20px;
    border-radius: 15px;
    width: 90%;
    max-width: 360px;
    margin: auto;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    margin-bottom: 20px;
}

h2 {
    color: #2e7d32;
    cursor: pointer;
}

input {
    padding: 12px;
    width: 100%;
    border-radius: 8px;
    border: 1px solid #c8e6c9;
    margin-bottom: 15px;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 14px;
    margin: 6px 0;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    cursor: pointer;
}

.arrived { background-color: #a5d6a7; }
.late5 { background-color: #c5e1a5; }
.lateMore { background-color: #ffccbc; }

button:hover { opacity: 0.9; }

.admin {
    display: none;
}

.record {
    background: #f1f8e9;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 8px;
    text-align: left;
}
</style>
</head>

<body>

<div class="clinicName">
Sorim Acupuncture
</div>
<div class="clinicSub">
& Healing Art Ltd
</div>

<div class="container">
<h2 id="secretTrigger">🌿 체크인</h2>

<input type="text" id="name" placeholder="이름 입력">

<button class="arrived" onclick="checkIn('도착')">✅ 도착 (체크인)</button>
<button class="late5" onclick="checkIn('5분 늦음')">⏰ 늦음 (5분)</button>
<button class="lateMore" onclick="checkIn('5분 이상 늦음')">🚨 늦음 (5분 이상)</button>

<p id="message"></p>
</div>

<div class="container admin" id="adminPanel">
<h2>👩‍⚕️ 관리자 기록</h2>
<div id="records"></div>
<button onclick="clearRecords()">🗑 오늘 기록 삭제</button>
</div>

<audio id="bellSound">
<source src="https://www.soundjay.com/buttons/sounds/button-3.mp3" type="audio/mpeg">
</audio>

<script>
const ADMIN_PASSWORD = "hailey2026!";

let clickCount = 0;

document.getElementById("secretTrigger").addEventListener("click", function(){
    clickCount++;
    if(clickCount >= 5){
        askPassword();
        clickCount = 0;
    }
});

function checkIn(status) {
    const name = document.getElementById("name").value;

    if(name === ""){
        alert("이름을 입력해주세요 💚");
        return;
    }

    const time = new Date().toLocaleString();
    const record = { name, status, time };

    let data = JSON.parse(localStorage.getItem("checkins")) || [];
    data.push(record);
    localStorage.setItem("checkins", JSON.stringify(data));

    document.getElementById("message").innerText =
        "체크인 완료 💚";

    document.getElementById("bellSound").play();
    document.getElementById("name").value = "";
}

function askPassword(){
    const input = prompt("관리자 비밀번호를 입력하세요");

    if(input === ADMIN_PASSWORD){
        document.getElementById("adminPanel").style.display = "block";
        displayRecords();
    } else {
        alert("비밀번호가 틀렸습니다 🚫");
    }
}

function displayRecords() {
    const recordsDiv = document.getElementById("records");
    recordsDiv.innerHTML = "";

    let data = JSON.parse(localStorage.getItem("checkins")) || [];

    data.slice().reverse().forEach(item => {
        const div = document.createElement("div");
        div.className = "record";
        div.innerText =
            item.name + " | " +
            item.status + " | " +
            item.time;
        recordsDiv.appendChild(div);
    });
}

function clearRecords(){
    if(confirm("오늘 기록을 모두 삭제할까요?")){
        localStorage.removeItem("checkins");
        displayRecords();
    }
}
</script>

</body>
</html>
